{% extends "base.html" %}
{% block title %}Новое бронирование{% endblock %}
{% block page_title %}Создать бронирование{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
<form method="post" action="/bookings/" class="card p-6 space-y-5">
    <div>
        <label class="form-label">Гость</label>
        <select name="guest_id" required class="form-input">
            <option value="">— выберите гостя —</option>
            {% for g in guests %}
            <option value="{{ g.id }}">{{ g.full_name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="form-label">Дата заезда</label>
            <input type="date" name="check_in" id="check_in" required class="form-input"
                   hx-get="/bookings/available-rooms" hx-include="#hotel_id,#check_in,#check_out"
                   hx-target="#rooms-list" hx-trigger="change">
        </div>
        <div>
            <label class="form-label">Дата выезда</label>
            <input type="date" name="check_out" id="check_out" required class="form-input"
                   hx-get="/bookings/available-rooms" hx-include="#hotel_id,#check_in,#check_out"
                   hx-target="#rooms-list" hx-trigger="change">
        </div>
    </div>

    <div>
        <label class="form-label">Отель</label>
        <select name="hotel_id" id="hotel_id" required class="form-input"
                hx-get="/bookings/available-rooms" hx-include="#hotel_id,#check_in,#check_out"
                hx-target="#rooms-list" hx-trigger="change">
            <option value="">— выберите отель —</option>
            {% for h in hotels %}
            <option value="{{ h.id }}">{{ h.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div id="rooms-list" class="space-y-2">
        <div class="empty-state border border-dashed border-slate-200 rounded-xl">
            <div class="empty-state-icon">🔍</div>
            <p class="text-sm text-slate-400">Выберите отель и даты, чтобы увидеть свободные номера</p>
        </div>
    </div>

    <button type="submit" class="btn-primary w-full py-3">Забронировать</button>
</form>
</div>

<script>
document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id !== 'rooms-list') return;
    try {
        const rooms = JSON.parse(evt.detail.xhr.responseText);
        const el = document.getElementById('rooms-list');
        if (!rooms.length) {
            el.innerHTML = '<div class="empty-state border border-dashed border-rose-200 rounded-xl bg-rose-50/40"><div class="empty-state-icon bg-rose-100">😔</div><p class="text-sm text-rose-600 font-medium">Нет свободных номеров</p></div>';
            return;
        }
        el.innerHTML = rooms.map(r =>
            `<label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/50 transition-all has-[:checked]:border-indigo-500 has-[:checked]:bg-indigo-50">
                <input type="radio" name="room_id" value="${r.id}" required class="text-indigo-600">
                <div class="flex-1">
                    <div class="font-semibold text-slate-800">№${r.room_number}</div>
                    <div class="text-xs text-slate-500">${r.category}</div>
                </div>
                <div class="text-right">
                    <div class="font-bold">${Number(r.base_price).toLocaleString('ru')} ₽</div>
                    <div class="text-xs text-slate-400">/ночь</div>
                </div>
            </label>`
        ).join('');
    } catch(e) {}
});
</script>
{% endblock %}
