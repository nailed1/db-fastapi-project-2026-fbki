{% extends "base.html" %}
{% block title %}Новое бронирование{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Новое бронирование</h1>

    <form method="post" action="/bookings/" class="bg-white rounded-xl shadow p-6 space-y-5">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Гость</label>
            <select name="guest_id" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                <option value="">— выберите гостя —</option>
                {% for g in guests %}
                <option value="{{ g.id }}">{{ g.full_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Дата заезда</label>
                <input type="date" name="check_in" id="check_in" required
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                       hx-get="/bookings/available-rooms"
                       hx-include="#hotel_id,#check_in,#check_out"
                       hx-target="#rooms-list"
                       hx-trigger="change">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Дата выезда</label>
                <input type="date" name="check_out" id="check_out" required
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                       hx-get="/bookings/available-rooms"
                       hx-include="#hotel_id,#check_in,#check_out"
                       hx-target="#rooms-list"
                       hx-trigger="change">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Отель</label>
            <select name="hotel_id" id="hotel_id"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                    hx-get="/bookings/available-rooms"
                    hx-include="#hotel_id,#check_in,#check_out"
                    hx-target="#rooms-list"
                    hx-trigger="change">
                <option value="">— выберите отель —</option>
                {% for h in hotels %}
                <option value="{{ h.id }}">{{ h.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- HTMX fills this from /bookings/available-rooms -->
        <div id="rooms-list">
            <p class="text-sm text-gray-400">Выберите отель и даты, чтобы увидеть доступные номера.</p>
        </div>

        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition font-medium">
            Забронировать
        </button>
    </form>
</div>

<!-- HTMX partial: available rooms rendered inline -->
<script>
// When HTMX returns rooms JSON, render radio buttons
document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'rooms-list') {
        try {
            const rooms = JSON.parse(evt.detail.xhr.responseText);
            const el = document.getElementById('rooms-list');
            if (!rooms.length) {
                el.innerHTML = '<p class="text-sm text-red-400">Нет доступных номеров на выбранные даты.</p>';
                return;
            }
            el.innerHTML = '<label class="block text-sm font-medium text-gray-700 mb-2">Номер</label>' +
                rooms.map(r =>
                    `<label class="flex items-center gap-3 p-3 border rounded-lg mb-2 cursor-pointer hover:bg-indigo-50">
                        <input type="radio" name="room_id" value="${r.id}" required>
                        <span class="font-medium">№${r.room_number}</span>
                        <span class="text-gray-500 text-sm">${r.category}</span>
                        <span class="ml-auto font-mono text-indigo-700">${r.base_price} ₽/ночь</span>
                    </label>`
                ).join('');
        } catch(e) { /* not JSON, leave as-is */ }
    }
});
</script>
{% endblock %}
