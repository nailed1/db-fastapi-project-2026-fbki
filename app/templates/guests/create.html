{% extends "base.html" %}
{% block title %}Новый гость{% endblock %}
{% block page_title %}Добавить гостя{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
<form method="post" action="/guests/" class="card p-6 space-y-4">
    <div>
        <label class="form-label">ФИО *</label>
        <input type="text" name="full_name" required autofocus class="form-input"
               placeholder="Иванов Иван Иванович">
    </div>
    <div>
        <label class="form-label">Паспортные данные *</label>
        <input type="text" name="passport" required class="form-input" placeholder="4500 123456">
    </div>
    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="form-label">Телефон</label>
            <input type="tel" name="phone" class="form-input" placeholder="+7-...">
        </div>
        <div>
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-input">
        </div>
    </div>
    <div class="flex gap-2 pt-2">
        <button type="submit" class="btn-primary flex-1">Сохранить</button>
        <a href="/guests/" class="btn-secondary flex-1 text-center">Отмена</a>
    </div>
</form>
</div>
{% endblock %}
