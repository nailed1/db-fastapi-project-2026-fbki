{% extends "base.html" %}
{% block title %}Бронирование{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Забронировать номер</h1>

    <form method="post" action="/portal/tourist/book" class="bg-white rounded-xl shadow p-6 space-y-5">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Отель</label>
            <select name="hotel_id" id="hotel_id" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                    hx-get="/bookings/available-rooms"
                    hx-include="#hotel_id,#check_in,#check_out"
                    hx-target="#rooms-list"
                    hx-trigger="change">
                <option value="">— выберите отель —</option>
                {% for h in hotels %}
                <option value="{{ h.id }}" {% if selected_hotel and selected_hotel.id == h.id %}selected{% endif %}>
                    {{ h.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Дата заезда</label>
                <input type="date" name="check_in" id="check_in" required
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                       hx-get="/bookings/available-rooms"
                       hx-include="#hotel_id,#check_in,#check_out"
                       hx-target="#rooms-list" hx-trigger="change">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Дата выезда</label>
                <input type="date" name="check_out" id="check_out" required
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                       hx-get="/bookings/available-rooms"
                       hx-include="#hotel_id,#check_in,#check_out"
                       hx-target="#rooms-list" hx-trigger="change">
            </div>
        </div>

        <div id="rooms-list">
            <p class="text-sm text-gray-400">Выберите отель и даты для просмотра свободных номеров.</p>
        </div>

        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition font-medium">
            Забронировать
        </button>
    </form>

    <p class="text-center text-sm text-gray-400 mt-4">
        <a href="/portal/tourist/" class="hover:underline">← Назад в кабинет</a>
    </p>
</div>

<script>
document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'rooms-list') {
        try {
            const rooms = JSON.parse(evt.detail.xhr.responseText);
            const el = document.getElementById('rooms-list');
            if (!rooms.length) {
                el.innerHTML = '<p class="text-sm text-red-400 p-3 bg-red-50 rounded-lg">Нет свободных номеров на выбранные даты.</p>';
                return;
            }
            el.innerHTML = '<p class="text-sm font-medium text-gray-700 mb-2">Выберите номер:</p>' +
                rooms.map(r =>
                    `<label class="flex items-center gap-3 p-3 border rounded-lg mb-2 cursor-pointer hover:bg-indigo-50 transition">
                        <input type="radio" name="room_id" value="${r.id}" required>
                        <span class="font-medium">№${r.room_number}</span>
                        <span class="text-gray-500 text-sm">${r.category}</span>
                        <span class="ml-auto font-mono text-indigo-700 text-sm">${Number(r.base_price).toLocaleString()} ₽/ночь</span>
                    </label>`
                ).join('');
        } catch(e) {}
    }
});
</script>
{% endblock %}
